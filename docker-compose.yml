version: "3.8"

services:
  api:
    build: .
    ports:
      - "3456:3456"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3456
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=file:./data/mailsplit.db
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  worker:
    build: .
    command: ["bun", "src/server/worker.ts"]
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=file:./data/mailsplit.db
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  redis_data:
